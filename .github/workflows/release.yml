name: Release
on: {push: {tags: ['v*']}}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.22'}
      - run: GOOS=linux GOARCH=amd64 go build -o file-find-linux-amd64 .
      - run: GOOS=linux GOARCH=arm64 go build -o file-find-linux-arm64 .
      - run: GOOS=darwin GOARCH=amd64 go build -o file-find-darwin-amd64 .
      - run: GOOS=darwin GOARCH=arm64 go build -o file-find-darwin-arm64 .
      - run: sha256sum file-find-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with: {files: "file-find-*"}
